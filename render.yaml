# Render Blueprint: two web services that talk over Render's internal network.
# The Java backend reaches Python via the autogenerated *.internal hostname so the
# call never leaves Render's private network.

services:
  - type: web
    name: python-analytics
    runtime: docker
    plan: free
    dockerfilePath: ./python-module/Dockerfile
    dockerContext: ./python-module
    healthCheckPath: /api/v1/health
    autoDeploy: true

  - type: web
    name: java-backend
    runtime: docker
    plan: free
    dockerfilePath: ./java-backend/Dockerfile
    dockerContext: ./java-backend
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      # Set MONGODB_URI in the Render dashboard (sync:false keeps it out of git).
      - key: MONGODB_URI
        sync: false
      # Render resolves <name>.internal -> the sibling service's private address.
      - key: PYTHON_SERVICE_URL
        value: http://python-analytics:8000
